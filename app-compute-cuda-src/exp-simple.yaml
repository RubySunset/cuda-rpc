{{#include}}
env-cluster-{{cluster}}.inc.yaml
{{/include}}


node-0: &node-0 !node 0


experiment-info:
  logs-dir: logs/{{ID}}
  # auto-managed files to identify how the experiment went
  fail-file: {{FAIL}}
  done-file: {{DONE}}

experiment:
  - name: manager
    node: *node-0
    run-program: *run-program-fractos-manager
  - name: ctl0
    node: *node-0
    run-program: *run-program-fractos-controller
  - name: gns
    node: *node-0
    run-program: *run-program-fractos-gns
  - name: service
    node: *node-0
    run-program:
      type: uplane
      command: fractos-service-compute-cuda
      background: True
  - name: benchmark
    node: *node-0
    run-program:
      type: uplane
      command: simple
      timeout: 60
      # nsys profile --trace=cuda,nvtx --trace-fork-before-exec=true
